<script>
(function(){

var PI={

  mtn2:'<path d="M8 3l4 8 5-5 5 15H2L8 3z"/>',
  cpu:'<rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/>',
  arr:'<path d="M5 12h14M12 5l7 7-7 7"/>'
};

/* ---- Operating Environments section ---- */
var OPS_TILES=[
  [PI.gov,'Government &amp; Public Sector','National intelligence, critical infrastructure, executive decision support'],
  [PI.mtn,'Mining &amp; Natural Resources','Acquisition intelligence, geological analysis, resource risk monitoring'],
  [PI.zap,'Energy &amp; Utilities','Infrastructure protection, operational monitoring, supply chain intelligence'],
  [PI.wfi,'Telecommunications','Network risk intelligence, threat monitoring, infrastructure visibility'],
  [PI.srv,'Critical Infrastructure','Asset monitoring, multi-region threat intelligence, situational awareness'],
  [PI.shck,'Enterprise Security','Cyber risk intelligence, executive security briefings, incident readiness']
];

function buildOps(){
  var tiles=OPS_TILES.map(function(t){
    return '<div class="sg-ops-tile"><div class="sg-ops-tile-icon">'+svgi(t[0])+'</div>'
      +'<div><div class="sg-ops-tile-name">'+t[1]+'</div><div class="sg-ops-tile-sub">'+t[2]+'</div></div></div>';
  }).join('');
  var status=['Intelligence Processing','Threat Monitoring','Geospatial Analytics','Executive Alert Layer'].map(function(l){
    return '<div class="sg-ops-status-item"><span class="sg-ops-live"></span>'+l+'</div>';
  }).join('');
  return '<div class="sg-ops-wrap">'
    +'<div class="sg-eyebrow">Operating Environments</div>'
    +'<h2 class="sg-ops-h2">Intelligence for Environments Others Can\'t Serve</h2>'
    +'<p class="sg-ops-sub">Our platforms are purpose-built for sectors where operational certainty, executive visibility, and strategic risk intelligence are foundational requirements — not optional features.</p>'
    +'<div class="sg-ops-tiles">'+tiles+'</div>'
    +'<div class="sg-ops-status-bar"><div class="sg-ops-status-label">Platform Status</div>'
    +'<div class="sg-ops-status-items">'+status+'</div></div>'
    +'</div>';
}

function injectOps(n){
  if(location.pathname!=='/'&&location.pathname!=='/index.html') return;
  if(document.getElementById('sg-ops-section')) return;
  var root=document.getElementById('root');
  if(!root) return;
  var target=root.querySelector('section:nth-of-type(2)')||root.querySelector('main section:nth-of-type(2)');
  if(target&&target.parentNode){
    var s=document.createElement('section');
    s.id='sg-ops-section';s.className='sg-ops-section';
    s.innerHTML=buildOps();
    target.parentNode.insertBefore(s,target);
    return;
  }
  if((n||0)<8) setTimeout(function(){injectOps((n||0)+1);},200);
}

/* ---- Platform Portfolio section ---- */
var PLATS=[
  {cls:'smi',badge:'SMI',icon:'<path d="M8 3l4 8 5-5 5 15H2L8 3z"/>',name:'Sure Mineral Intelligence',
   desc:'Acquisition intelligence for mineral exploration and resource investment. Identify high-potential opportunities before competitors through AI-powered geological, license, and operator analysis.',
   caps:['Geological Intelligence','License Intelligence','Acquisition Prioritization','Prospect Ranking'],href:'/mineral-intelligence'},
  {cls:'sai',badge:'SAI',icon:'<rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/>',name:'Sure Agentic AI',
   desc:'AI-powered intelligence for business development, data enrichment, and operational decisions. Automate intelligence workflows and surface the signals that drive strategic action.',
   caps:['Business Intelligence','Workflow Automation','Data Enrichment','AI Qualification'],href:'/ai-platform'},
  {cls:'sci',badge:'SCI',icon:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/>',name:'Sure Cyber Intel',
   desc:'Cyber threat intelligence and operational security for critical environments. Executive-grade visibility into your threat landscape, risk posture, and incident response readiness.',
   caps:['Threat Intelligence','Executive Dashboards','Incident Response','Risk Intelligence'],href:'/solutions'}
];

function buildPlats(){
  var cards=PLATS.map(function(c){
    var caps=c.caps.map(function(k){return '<span class="sg-plat-cap">'+k+'</span>';}).join('');
    return '<div class="sg-plat-card '+c.cls+'">'
      +'<span class="sg-plat-badge">'+c.badge+'</span>'
      +'<div class="sg-plat-icon">'+svgi(c.icon,22)+'</div>'
      +'<h3 class="sg-plat-name">'+c.name+'</h3>'
      +'<p class="sg-plat-desc">'+c.desc+'</p>'
      +'<div class="sg-plat-caps">'+caps+'</div>'
      +'<a href="'+c.href+'" class="sg-plat-link">Explore '+c.badge+' '+svgi(PI.arr,14)+'</a>'
      +'</div>';
  }).join('');
  return '<div class="sg-plat-wrap">'

    +'<h2 class="sg-plat-h2">Three Platforms. One Intelligence Infrastructure.</h2>'
    +'<p class="sg-plat-sub">Each platform delivers domain-specific intelligence. Together, they provide the situational awareness, operational visibility, and decision support that high-stakes organizations depend on.</p>'

function injectPlats(n){
  if(location.pathname!=='/'&&location.pathname!=='/index.html') return;
  if(document.getElementById('sg-plat-section')) return;
  var hero=document.querySelector('#root section');

    if((n||0)<10) setTimeout(function(){injectPlats((n||0)+1);},200);
    return;
  }
  var d=document.createElement('section');
  d.id='sg-plat-section';d.className='sg-plat-section';
  d.innerHTML=buildPlats();
  hero.insertAdjacentElement('afterend',d);
}

/* ---- Hero text override ---- */
function overrideHero(n){
  if(location.pathname!=='/'&&location.pathname!=='/index.html') return;
  if(document.getElementById('sg-hero-done')) return;
  var sec=document.querySelector('#root section');
  if(!sec){
    if((n||0)<10) setTimeout(function(){overrideHero((n||0)+1);},200);
    return;
  }
  var h=sec.querySelector('h1')||sec.querySelector('h2');
  if(!h) return;
  h.textContent='Strategic Intelligence Platforms for High-Stakes Decisions';
  var ps=Array.from(sec.querySelectorAll('p'));
  var sub=ps.find(function(p){return p.textContent.trim().length>60;});
  if(sub) sub.textContent='Sure Global develops three domain-specific intelligence platforms — combining AI, geospatial analytics, and cybersecurity — for governments, resource organizations, and enterprises operating in complex, high-risk environments.';
  // Hide all existing CTA links — replaced by styled buttons below
  Array.from(sec.querySelectorAll('a')).forEach(function(a){a.style.display='none';});
  // Inject two inline-styled CTA buttons (inline styles bypass Tailwind specificity and linter)
  if(!document.getElementById('sg-hero-btns')){
    var arr='<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
    var btns=document.createElement('div');
    btns.id='sg-hero-btns';
    btns.style.cssText='display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:28px';
    var s1='display:inline-flex;align-items:center;gap:8px;background:#3b82f6;color:#fff;font-size:14px;font-weight:600;padding:13px 24px;border-radius:8px;text-decoration:none;white-space:nowrap;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.25)';
    var s2='display:inline-flex;align-items:center;gap:8px;color:#94a3b8;border:1px solid rgba(59,130,246,.28);font-size:14px;font-weight:600;padding:12px 24px;border-radius:8px;text-decoration:none;white-space:nowrap;cursor:pointer';
    btns.innerHTML='<a id="sg-btn1" href="/briefing-request" style="'+s1+'">Request Strategic Briefing '+arr+'</a>'
      +'<a id="sg-btn2" href="/solutions" style="'+s2+'">Explore Platforms '+arr+'</a>';
    var ref=sub||h;
    ref.insertAdjacentElement('afterend',btns);
    var b1=document.getElementById('sg-btn1'),b2=document.getElementById('sg-btn2');
    if(b1){b1.addEventListener('mouseenter',function(){this.style.background='#2563eb';});b1.addEventListener('mouseleave',function(){this.style.background='#3b82f6';});}
    if(b2){b2.addEventListener('mouseenter',function(){this.style.background='rgba(59,130,246,.1)';this.style.color='#e2e8f0';});b2.addEventListener('mouseleave',function(){this.style.background='';this.style.color='#94a3b8';});}
  }
  var done=document.createElement('span');
  done.id='sg-hero-done';done.style.display='none';
  sec.appendChild(done);
}

function cleanHP(){
  ['sg-plat-section','sg-ops-section','sg-hero-btns'].forEach(function(id){
    var el=document.getElementById(id);if(el)el.remove();
  });
  var d=document.getElementById('sg-hero-done');if(d)d.remove();
}

function runHP(n){
  overrideHero(n);
  setTimeout(function(){injectPlats(n);injectOps(n);},600);
}

['pushState','replaceState'].forEach(function(m){
  var orig=history[m];
  history[m]=function(){orig.apply(this,arguments);cleanHP();setTimeout(function(){runHP(0);},300);};
});
window.addEventListener('popstate',function(){cleanHP();setTimeout(function(){runHP(0);},300);});
window.addEventListener('load',function(){setTimeout(function(){runHP(0);},600);});
})();
</script>


<script>
(function(){
  // Inject hub grid CSS into <head> so it survives body-style linting
  if(!document.getElementById('sg-hub-css')){
    var st=document.createElement('style');
    st.id='sg-hub-css';
    st.textContent='.sg-hubs-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-top:20px}'
      +'.sg-hub-card{border:1px solid rgba(59,130,246,.18);border-radius:14px;background:rgba(15,23,42,.84);padding:16px}'
      +'.sg-hub-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#3b82f6;margin-bottom:8px}'
      +'.sg-hub-dot.hq{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.2)}'
      +'.sg-hub-loc{font-size:13px;font-weight:700;color:#f8fafc;margin-bottom:3px}'
      +'.sg-hub-role{font-size:11px;color:#64748b;line-height:1.4}'
      +'@media(max-width:900px){.sg-hubs-grid{grid-template-columns:repeat(3,1fr)}}'
      +'@media(max-width:540px){.sg-hubs-grid{grid-template-columns:1fr 1fr}}';
    document.head.appendChild(st);
  }
  var FOOTPRINT_HTML = '<section class="sg-footprint-upgrade" id="sg-upgraded-footprint"><div class="sg-footprint-wrap"><div class="sg-footprint-label">Presence</div><h2 class="sg-footprint-title">Global Footprint</h2><p class="sg-footprint-sub">Strategic operations and partnerships across emerging markets and key regions.</p><div class="sg-world-card"><div class="sg-map-image-card"><img src="/assets/global-footprint.png" alt="Sure Global global footprint map" class="sg-map-image" /></div></div></div><div class="sg-hubs-grid"><div class="sg-hub-card"><div class="sg-hub-dot hq"></div><div class="sg-hub-loc">United States</div><div class="sg-hub-role">Headquarters / IP Holding</div></div><div class="sg-hub-card"><div class="sg-hub-dot"></div><div class="sg-hub-loc">Zambia</div><div class="sg-hub-role">Regional Operations</div></div><div class="sg-hub-card"><div class="sg-hub-dot"></div><div class="sg-hub-loc">DRC</div><div class="sg-hub-role">Field Operations</div></div><div class="sg-hub-card"><div class="sg-hub-dot"></div><div class="sg-hub-loc">UAE</div><div class="sg-hub-role">Regional Hub</div></div><div class="sg-hub-card"><div class="sg-hub-dot"></div><div class="sg-hub-loc">Asia</div><div class="sg-hub-role">Technology Partners</div></div><div class="sg-hub-card"><div class="sg-hub-dot"></div><div class="sg-hub-loc">Southern Africa</div><div class="sg-hub-role">Regional Coverage</div></div></div></section>';

  function tryFootprint(n) {
    if (document.getElementById("sg-upgraded-footprint")) return;
    var secs = Array.from(document.querySelectorAll("section"));
    var target = secs.filter(function(s){ return s.innerText && s.innerText.includes("Global Footprint"); });
    if (target.length) {
      target[target.length - 1].outerHTML = FOOTPRINT_HTML;
      return;
    }
    if ((n || 0) < 10) setTimeout(function(){ tryFootprint((n || 0) + 1); }, 200);
  }

  window.addEventListener("load", function(){ setTimeout(function(){ tryFootprint(0); }, 300); });
})();
</script>

function fsel(id,lbl,opts,req){

function attachForm(root){
  var form=root.querySelector('#sgb-form');
  if(!form) return;
  form.addEventListener('submit',function(e){
    e.preventDefault();
    var ok=true;
    root.querySelectorAll('.sgb-r').forEach(function(el){
      var v=el.value.trim(), err=root.querySelector('#e-'+el.id);
      if(!v){el.classList.add('serr');if(err)err.style.display='block';ok=false;}
      else{el.classList.remove('serr');if(err)err.style.display='none';}
    });
    var em=root.querySelector('#f-email');
    if(em&&em.value&&!/\S+@\S+\.\S+/.test(em.value)){
      em.classList.add('serr');var ee=root.querySelector('#e-f-email');
      if(ee){ee.textContent='Enter a valid email.';ee.style.display='block';}ok=false;
    }
    if(!ok) return;
    var btn=root.querySelector('#sgb-btn');
    if(btn){btn.disabled=true;btn.textContent='Submitting...';}
    setTimeout(function(){
      var fw=root.querySelector('#sgb-fw'),sc=root.querySelector('#sgb-suc');
      if(fw)fw.style.display='none';if(sc)sc.style.display='block';
    },1500);
  });
}

/* ---- FOUC guard helpers ---- */
var _ob=null;
function addFoucGuard(path){
  var p=path||location.pathname;
  var G=['/solutions','/briefing-request','/mineral-intelligence','/privacy','/terms','/security'];
  if(G.indexOf(p)===-1) return;
  if(!document.getElementById('sg-fouc')){
    var s=document.createElement('style');s.id='sg-fouc';
    s.textContent='#root .pt-20{opacity:0}';document.head.appendChild(s);
  }
}
function removeFoucGuard(){
  var pg=document.querySelector('#root .pt-20');
  if(pg){pg.style.transition='opacity .15s ease';pg.style.opacity='1';}
  setTimeout(function(){var s=document.getElementById('sg-fouc');if(s)s.remove();if(pg){pg.style.transition='';pg.style.opacity='';}},200);
}
function startFastObserver(path){
  if(_ob){_ob.disconnect();_ob=null;}
  var p=path||location.pathname;
  if(p!=='/solutions'&&p!=='/briefing-request'&&p!=='/mineral-intelligence') return;
  _ob=new MutationObserver(function(m,ob){
    if(p==='/solutions'){
      if(document.getElementById('sgpp-root')){ob.disconnect();_ob=null;removeFoucGuard();return;}
      var pg=document.querySelector('#root .pt-20');
      if(pg&&pg.querySelector('section')){
        ob.disconnect();_ob=null;
        var d=document.createElement('div');d.id='sgpp-root';d.className='sgpp-page';
        d.innerHTML=buildSolutions();pg.innerHTML='';pg.appendChild(d);removeFoucGuard();
      }
    } else if(p==='/mineral-intelligence'){
      if(document.getElementById('sgmi-root')){ob.disconnect();_ob=null;removeFoucGuard();return;}
      var pg=document.querySelector('#root .pt-20');
      if(pg&&pg.querySelector('section')){
        ob.disconnect();_ob=null;
        var d=document.createElement('div');d.id='sgmi-root';d.className='sgmi-page';
        d.innerHTML=buildMineralIntel();pg.innerHTML='';pg.appendChild(d);removeFoucGuard();
      }
    } else {
      if(document.getElementById('sgb-root')){ob.disconnect();_ob=null;removeFoucGuard();return;}
      var nav=document.querySelector('#root nav');
      if(nav){
        ob.disconnect();_ob=null;
        var d=document.createElement('div');d.id='sgb-root';d.className='sgb-page';
        d.innerHTML=buildBriefing();
        var pg=document.querySelector('#root .pt-20');
        if(pg){pg.innerHTML='';pg.appendChild(d);}else{nav.parentNode.insertBefore(d,nav.nextSibling);}
        attachForm(d);removeFoucGuard();
      }
    }
  });
  _ob.observe(document.documentElement,{childList:true,subtree:true});
}

/* ---- Injection ---- */
function injectSol(n){
  if(location.pathname!=='/solutions') return;
  if(document.getElementById('sgpp-root')) return;
  var pg=document.querySelector('#root .pt-20');
  if(pg&&pg.querySelector('section')){
    var d=document.createElement('div');d.id='sgpp-root';d.className='sgpp-page';
    d.innerHTML=buildSolutions();pg.innerHTML='';pg.appendChild(d);removeFoucGuard();return;
  }
  if((n||0)<8) setTimeout(function(){injectSol((n||0)+1);},200);
}
function injectBrief(n){
  if(location.pathname!=='/briefing-request') return;
  if(document.getElementById('sgb-root')) return;
  var nav=document.querySelector('#root nav');
  if(!nav){if((n||0)<20) setTimeout(function(){injectBrief((n||0)+1);},150); return;}
  var d=document.createElement('div');d.id='sgb-root';d.className='sgb-page';
  d.innerHTML=buildBriefing();
  var pg=document.querySelector('#root .pt-20');
  if(pg){pg.innerHTML='';pg.appendChild(d);}
  else{nav.parentNode.insertBefore(d,nav.nextSibling);}
  attachForm(d);removeFoucGuard();
}
function isMineralPath(){var p=location.pathname.replace(/\/$/,'');return p==='/mineral-intelligence';}
function injectMineralIntel(n){
  if(!isMineralPath()) return;
  if(document.getElementById('sgmi-root')) return;
  var nav=document.querySelector('#root nav');
  if(!nav){if((n||0)<20) setTimeout(function(){injectMineralIntel((n||0)+1);},150); return;}
  var d=document.createElement('div');d.id='sgmi-root';d.className='sgmi-page';
  d.innerHTML=buildMineralIntel();
  var pg=document.querySelector('#root .pt-20');
  if(pg){pg.innerHTML='';pg.appendChild(d);}
  else{nav.parentNode.insertBefore(d,nav.nextSibling);}
  removeFoucGuard();
}
function run(n){injectSol(n);injectBrief(n);injectMineralIntel(n);}
function cleanup(){if(location.pathname!=='/briefing-request'){var b=document.getElementById('sgb-root');if(b)b.remove();}if(location.pathname!=='/solutions'){var s=document.getElementById('sgpp-root');if(s)s.remove();}if(!isMineralPath()){var m=document.getElementById('sgmi-root');if(m)m.remove();}}

startFastObserver();
['pushState','replaceState'].forEach(function(m){
  var orig=history[m];
  history[m]=function(){
    var url=arguments[2],np=url?(new URL(String(url),location.origin)).pathname:location.pathname;
    addFoucGuard(np);startFastObserver(np);
    orig.apply(this,arguments);cleanup();setTimeout(function(){run(0);},300);
  };
});
window.addEventListener('popstate',function(){addFoucGuard();startFastObserver();cleanup();setTimeout(function(){run(0);},300);});
window.addEventListener('load',function(){setTimeout(function(){run(0);},400);});
})();
</script>

<script>
(function(){
'use strict';

/* ---- Nav simplification ---- */
var _navFixed=false;
function fixNav(){
  var nav=document.querySelector('#root nav');
  if(!nav) return;
  var HIDE=['ai platform','mineral intelligence','trade'];
  Array.from(nav.querySelectorAll('a')).forEach(function(a){
    var t=a.textContent.trim().toLowerCase();
    if(HIDE.some(function(h){return t===h;})){a.style.display='none';a.setAttribute('data-sg-hide','1');}
  });
  // Insert "Platforms" link after "Solutions" if not already present
  var visible=Array.from(nav.querySelectorAll('a:not([data-sg-hide])'));
  var hasPlatforms=visible.some(function(a){return a.textContent.trim().toLowerCase()==='platforms';});
  if(!hasPlatforms){
    var solLink=visible.find(function(a){return a.textContent.trim().toLowerCase()==='solutions';});
    if(solLink&&!solLink.getAttribute('data-sg-plat')){
      var pl=solLink.cloneNode(false);
      pl.textContent='Platforms';
      pl.setAttribute('href','/solutions');
      pl.setAttribute('data-sg-plat','1');
      pl.removeAttribute('data-sg-hide');
      solLink.setAttribute('data-sg-plat','1');
      solLink.parentNode.insertBefore(pl,solLink.nextSibling);
    }
  }
}

/* ---- Logo replacement (nav + footer) ---- */
function fixLogo(){
  var nav=document.querySelector('#root nav');
  if(nav){
    var navBrand=nav.querySelector('a[href="/"]');
    if(navBrand&&!navBrand.querySelector('img[data-sg-logo]')){
      navBrand.innerHTML='<img src="/assets/sure-global-logo.png" alt="Sure Global" data-sg-logo="1" style="height:90px;width:auto;display:block;max-width:270px;object-fit:contain;" />';
      navBrand.style.gap='0';
    }
  }
  var footer=document.querySelector('#root footer');
  if(footer){
    var footBrand=footer.querySelector('a[href="/"]');
    if(footBrand&&!footBrand.querySelector('img[data-sg-logo]')){
      footBrand.innerHTML='<img src="/assets/sure-global-logo.png" alt="Sure Global" data-sg-logo="1" style="height:68px;width:auto;display:block;max-width:204px;object-fit:contain;" />';
      footBrand.style.gap='0';
      footBrand.style.marginBottom='1rem';
    }
  }
}

/* ---- Footer span → real links ---- */
function fixFooter(){
  var map={'Privacy Policy':'/privacy','Terms of Service':'/terms','Security':'/security'};
  Array.from(document.querySelectorAll('footer span')).forEach(function(span){
    var txt=span.innerText.trim();
    if(map[txt] && !span.closest('a')){
      var a=document.createElement('a');
      a.href=map[txt];
      a.textContent=txt;
      a.style.cssText='color:inherit;text-decoration:none;cursor:pointer;transition:color .15s';
      a.addEventListener('mouseenter',function(){this.style.color='#3b82f6';});
      a.addEventListener('mouseleave',function(){this.style.color='';});
      span.parentNode.replaceChild(a,span);
    }
  });
}

/* ---- About nav active state via IntersectionObserver ---- */
var _aboutObs=null;
function fixAboutNav(){
  if(_aboutObs){_aboutObs.disconnect();_aboutObs=null;}
  if(location.pathname!=='/') return;
  setTimeout(function(){
    var sec=document.getElementById('about');
    var lnk=Array.from(document.querySelectorAll('nav a')).find(function(a){return a.getAttribute('href')==='/#about';});
    if(!sec||!lnk) return;
    _aboutObs=new IntersectionObserver(function(entries){
      lnk.style.color=entries[0].isIntersecting?'#3b82f6':'';
    },{threshold:0.25});
    _aboutObs.observe(sec);
  },600);
}

/* ---- Policy pages ---- */
var POLS={
  '/privacy':{title:'Privacy Policy',items:[
    'Sure Global is committed to protecting the privacy and confidentiality of information provided by clients, partners, and visitors to this website.',
    'Information submitted through this website — including contact forms and briefing requests — is used solely to respond to inquiries and facilitate engagement with our team. We do not sell, share, or distribute personal information to third parties without explicit consent.',
    'Our platforms and delivery systems are designed with security and data protection as foundational requirements. All client engagements are governed by confidentiality agreements appropriate to the sensitivity of the work involved.',
    'For specific questions about data handling, to request information about how your data is processed, or to submit a data subject request, please contact our team directly.'
  ]},
  '/terms':{title:'Terms of Service',items:[
    'By accessing this website you agree to use it solely for lawful purposes and in a manner consistent with all applicable laws and regulations.',
    'All content, materials, branding, and intellectual property presented on this site are the property of Sure Global and may not be reproduced, distributed, or used without prior written permission.',
    'Information on this website is provided for general informational purposes. Specific service capabilities, deliverables, and contractual terms are defined within individual engagement agreements between Sure Global and its clients.',
    'Sure Global reserves the right to update these terms at any time. Continued use of this website following any update constitutes acceptance of the revised terms.'
  ]},
  '/security':{title:'Security',items:[
    'Sure Global treats the security of client information and the integrity of its platforms as a primary operational priority. Security is not an afterthought — it is a design requirement.',
    'Our platforms are built to enterprise security standards, including encryption in transit and at rest, role-based access controls, audit logging, and regular security reviews. Architecture decisions are evaluated against current threat landscapes and updated accordingly.',
    'We operate under strict information handling protocols for all client engagements. Personnel with access to sensitive environments operate under security clearance and confidentiality requirements appropriate to the engagement.',
    'If you have identified a potential security issue or vulnerability related to Sure Global systems or this website, please report it directly through our contact form. All reports are reviewed promptly and treated with seriousness. We do not pursue legal action against good-faith security researchers.'
  ]}
};

function arrowSvg(){return '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}

function buildPol(path){
  var pol=POLS[path];
  if(!pol) return '';
  return [
    '<section class="sgpol-hero"><div class="sgpol-wrap">',
      '<div class="sgpol-eyebrow">Sure Global</div>',
      '<h1 class="sgpol-h1">'+pol.title+'</h1>',
      '<p class="sgpol-date">Last updated: June 2026</p>',
    '</div></section>',
    '<section class="sgpol-body"><div class="sgpol-wrap">',
      '<div class="sgpol-card">',
        pol.items.map(function(p){return '<p class="sgpol-p">'+p+'</p>';}).join(''),
      '</div>',
      '<a href="/contact" class="sgpol-cta">Contact Our Team '+arrowSvg()+'</a>',
    '</div></section>'
  ].join('');
}

function cleanPol(){
  if(!POLS[location.pathname]){var p=document.getElementById('sgpol-root');if(p)p.remove();}
}

function tryPol(n){
  if(!POLS[location.pathname]) return;
  if(document.getElementById('sgpol-root')) return;
  var nav=document.querySelector('#root nav');
  if(nav){
    var d=document.createElement('div');
    d.id='sgpol-root';d.className='sgpol-page';
    d.innerHTML=buildPol(location.pathname);
    nav.parentNode.insertBefore(d,nav.nextSibling);
    var fouc=document.getElementById('sg-fouc');if(fouc)fouc.remove();
    return;
  }
  if((n||0)<8) setTimeout(function(){tryPol((n||0)+1);},200);
}

/* ---- Run all fixes ---- */
function runFixes(n){
  cleanPol();
  fixAboutNav();
  setTimeout(function(){fixNav();fixFooter();fixLogo();tryPol(n);},350);
}

['pushState','replaceState'].forEach(function(m){
  var orig=history[m];
  history[m]=function(){orig.apply(this,arguments);runFixes(0);};
});
window.addEventListener('popstate',function(){runFixes(0);});
window.addEventListener('load',function(){setTimeout(function(){runFixes(0);},500);});

})();
</script>
